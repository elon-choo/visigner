<!doctype html><html lang="en"><head><meta charset="utf-8"><title>FlowMetrics</title>
<style>body{font-family:Inter,system-ui,sans-serif;margin:0;background:#faf5ff}h1{color:#7c3aed}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;padding:2rem}.card{background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.1);padding:1.5rem;border-top:3px solid #7c3aed}</style></head>
<body>
<h1>FlowMetrics dashboard</h1>
<div class="grid">
<div class="card"><h3>Users</h3><p>1,204</p></div>
<div class="card"><h3>Sessions</h3><p>3,910</p></div>
<div class="card"><h3>Revenue</h3><p>$21k</p></div>
<div class="card"><h3>Churn</h3><p>2.1%</p></div>
<div class="card"><h3>NPS</h3><p>48</p></div>
<div class="card"><h3>Uptime</h3><p>99%</p></div>
</div>
</body></html>

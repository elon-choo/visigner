<!doctype html>
<html lang="ko" data-brand="default">
<head>
  <meta charset="utf-8" />
  <!-- viewport-fit=cover lets env(safe-area-inset-*) report real iOS notch/home-indicator insets. -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>detail-page · Vite + React + Tailwind v4 @theme</title>

  <!-- Restore a stored dark/light choice BEFORE paint (no flash). No stored value → no data-theme → light
       default, so the out-of-the-box render is unchanged. Defensive: localStorage failures (private mode) never throw. -->
  <script>
    (function () { try { var t = localStorage.getItem('page-theme'); if (t === 'dark' || t === 'light') document.documentElement.setAttribute('data-theme', t); } catch (e) {} })();
  </script>

  <!-- Fonts: Korean detail pages need Korean fonts. Pretendard body + bold KR display + optional Latin accent.
       These are the SAME families the brand-default tokens reference (--brand-font-*). Swap per brief. -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
</head>
<body class="bg-surface text-ink font-body">
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
